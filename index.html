<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>vicious afters</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Inter',sans-serif;
background:black;
}

.background{

position:fixed;
inset:-4%;

background:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
url('IMG_4271.JPG');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

animation:breathe 12s ease-in-out infinite;

z-index:-2;

}

/* Heavy VHS Grain */

body::after{

content:"";

position:fixed;
inset:0;

pointer-events:none;

background:

repeating-linear-gradient(
0deg,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 2px,
transparent 2px,
transparent 4px
),

repeating-radial-gradient(
circle at 25% 30%,
rgba(255,255,255,.08) 0 1px,
transparent 1px 4px
),

repeating-radial-gradient(
circle at 75% 65%,
rgba(255,255,255,.06) 0 1px,
transparent 1px 5px
);

mix-blend-mode:soft-light;

opacity:.95;

animation:grain .22s steps(2) infinite;

z-index:5;

}

.container{

position:relative;

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

z-index:2;

}

.content{

animation:fade 2s ease;

}

h1{

font-size:72px;

font-weight:300;

letter-spacing:14px;

text-transform:uppercase;

color:#efefef;

text-shadow:0 0 22px rgba(255,255,255,.08);

}

.subtitle{

margin-top:28px;

font-size:24px;

font-weight:300;

letter-spacing:8px;

color:#c8c8c8;

}

.line{

width:70px;

height:1px;

background:rgba(255,255,255,.35);

margin:42px auto;

}

.links{

display:flex;

flex-direction:column;

gap:18px;

}

.links a{

font-size:18px;

color:#bfbfbf;

text-decoration:none;

transition:.25s;

}

.links a:hover{

color:white;

transform:translateY(-2px);

}

@keyframes breathe{

0%{

transform:scale(1);
filter:brightness(1);

}

50%{

transform:scale(1.04);
filter:brightness(1.08);

}

100%{

transform:scale(1);
filter:brightness(1);

}

}

@keyframes grain{

0%{transform:translate(0,0);}
20%{transform:translate(-3px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-2px,-1px);}
80%{transform:translate(3px,2px);}
100%{transform:translate(0,0);}

}

@keyframes fade{

from{

opacity:0;
transform:translateY(12px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="content">

<h1>vicious afters</h1>

<div class="subtitle">

coming soon

</div>

<div class="line"></div>

<div class="links">

<a href="https://www.instagram.com/viciousafters" target="_blank">

instagram

</a>

</div>

</div>

</div>

</body>

</html>
